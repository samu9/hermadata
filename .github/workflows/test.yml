name: Test

on:
    push:
        paths:
            - "backend/*"
            - ".github/workflows/test.yml"
        branches:
            - "main"
        tags-ignore:
            - "**"
jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: mirromutth/mysql-action@v1.1
              with:
                  mysql database: "hermadata_test" # Optional, default value is "test". The specified database which will be create
                  mysql root password: "dev"
            - name: Set up uv
              uses: astral-sh/setup-uv@v5
            - name: Set up Python
              run: uv python install
            - name: Install dependencies
              run: |
                  cd backend
                  uv sync --group dev
            - name: Wait for MySQL
              run: |
                  for i in $(seq 1 30); do
                    mysqladmin ping -h 127.0.0.1 -u root -pdev --silent && break
                    echo "Waiting for MySQL... ($i)"
                    sleep 2
                  done
            - name: Database migrations
              run: |
                  cd backend
                  ENV_PATH=tests/.env uv run alembic -c tests/alembic.ini upgrade head
            - name: Run tests
              run: |
                  cd backend
                  mkdir tests/storage
                  uv run pytest --cov=hermadata --cov-report json
                  mv coverage.json ../
            - name: Update Coverage Badge
              # GitHub actions: default branch variable
              # https://stackoverflow.com/questions/64781462/github-actions-default-branch-variable
              if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
              uses: we-cli/coverage-badge-action@main
