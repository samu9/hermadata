name: Deploy

on:
    workflow_dispatch:
        inputs:
            component:
                description: 'Component to deploy'
                required: true
                default: 'both'
                type: choice
                options:
                    - both
                    - backend
                    - frontend

jobs:
    deploy-backend:
        name: Deploy Backend
        if: ${{ inputs.component == 'both' || inputs.component == 'backend' }}
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Build package
              run: |
                  cd backend
                  uv build

            - name: Start ssh-agent
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: Add remote host to known hosts
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

            - name: Upload package and alembic config
              run: |
                  scp backend/dist/*.tar.gz backend/alembic.ini \
                    ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/opt/hermadata

            - name: Install, migrate and restart
              run: |
                  ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'EOF'
                  set -e
                  cd /opt/hermadata
                  source .venv/bin/activate
                  export ENV_PATH=.env
                  pip install *.tar.gz --force-reinstall
                  rm *.tar.gz
                  alembic upgrade head
                  export NVM_DIR=~/.nvm
                  source "$NVM_DIR/nvm.sh"
                  pm2 restart hermadata-backend
                  EOF

    deploy-frontend:
        name: Deploy Frontend
        if: ${{ inputs.component == 'both' || inputs.component == 'frontend' }}
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json

            - name: Create .env file
              working-directory: frontend
              run: |
                  echo "VITE_API_BASE_URL=${{ secrets.BACKEND_URL }}" >> .env
                  echo "VITE_ASSETS_BASE_URL=${{ secrets.BACKEND_URL }}" >> .env

            - name: Install dependencies and build
              working-directory: frontend
              run: |
                  npm ci
                  npm run build

            - name: Compress build artifacts
              working-directory: frontend/dist
              run: tar -czf ../../hermadata-frontend.tar.gz .

            - name: Start ssh-agent
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: Add remote host to known hosts
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

            - name: Transfer build to remote server
              run: |
                  scp hermadata-frontend.tar.gz \
                    ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:~/hermadata-frontend.tar.gz

            - name: Deploy on remote server
              run: |
                  ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} '
                    mkdir -p /var/www/hermadata
                    tar -xzf ~/hermadata-frontend.tar.gz -C /var/www/hermadata
                    rm ~/hermadata-frontend.tar.gz
                  '
